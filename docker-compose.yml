services:
  backend:
    build: ./backend
    environment:
      - DB_PATH=/app/data/ngandic.sqlite
      - BASE_DATA_DIR=/app/data/user_data
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
